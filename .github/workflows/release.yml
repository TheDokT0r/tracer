name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.next }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --format="%s" --no-merges)
          else
            COMMITS=$(git log "$LATEST"..HEAD --format="%s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE "^[a-z]+!:|BREAKING CHANGE"; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE "^fix(\(.+\))?:"; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No release-worthy commits, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          if git tag -l | grep -qx "$NEXT"; then
            echo "Tag $NEXT already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($LATEST -> $NEXT)"

      - name: Build binaries
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          mkdir -p build dist
          for TARGET in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            OS="${TARGET%-*}"
            ARCH="${TARGET#*-}"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "-s -w -X main.version=$VERSION" -o build/tracer .
            cp tracer.1 build/
            tar -czf "dist/tracer-${TARGET}.tar.gz" -C build tracer tracer.1
            rm build/tracer build/tracer.1
          done

      - name: Upload binaries
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: build-darwin/
          retention-days: 1

      - name: Build darwin binaries for dmg
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          mkdir -p build-darwin
          for ARCH in amd64 arm64; do
            GOOS=darwin GOARCH=$ARCH go build -ldflags "-s -w -X main.version=$VERSION" -o "build-darwin/tracer-darwin-${ARCH}" .
          done

      - name: Upload darwin binaries
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: build-darwin/

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.next }}
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/* --generate-notes --title "$VERSION"

  dmg:
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download darwin binaries
        uses: actions/download-artifact@v4
        with:
          name: darwin-binaries
          path: build-darwin/

      - name: Create DMGs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.release.outputs.version }}

          for ARCH in amd64 arm64; do
            BINARY="build-darwin/tracer-darwin-${ARCH}"
            chmod +x "$BINARY"

            DMG_NAME="tracer-darwin-${ARCH}"
            DMG_DIR="dmg-staging-${ARCH}"
            mkdir -p "$DMG_DIR"

            cp "$BINARY" "$DMG_DIR/tracer"
            cp tracer.1 "$DMG_DIR/"

            # Create a simple README for the DMG
            cat > "$DMG_DIR/INSTALL.txt" << 'INSTALL'
          To install tracer:

            1. Copy "tracer" to /usr/local/bin or ~/.local/bin
            2. Optionally copy "tracer.1" to ~/.local/share/man/man1/

          Or run:
            cp tracer ~/.local/bin/ && chmod +x ~/.local/bin/tracer
          INSTALL

            hdiutil create -volname "tracer ${VERSION}" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "${DMG_NAME}.dmg"
          done

      - name: Upload DMGs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.release.outputs.version }}
          gh release upload "$VERSION" tracer-darwin-amd64.dmg tracer-darwin-arm64.dmg
