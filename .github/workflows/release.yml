name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Determine next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          default_bump: false
          dry_run: true
          tag_prefix: v

      - name: Build binaries
        if: steps.version.outputs.new_tag
        run: |
          VERSION=${{ steps.version.outputs.new_tag }}
          mkdir -p build dist
          for TARGET in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            OS="${TARGET%-*}"
            ARCH="${TARGET#*-}"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "-s -w -X main.version=$VERSION" -o build/tracer .
            cp tracer.1 build/
            tar -czf "dist/tracer-${TARGET}.tar.gz" -C build tracer tracer.1
            rm build/tracer build/tracer.1
          done

      - name: Create tag and release
        if: steps.version.outputs.new_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.new_tag }}
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/* --generate-notes --title "$VERSION"
