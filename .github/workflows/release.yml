name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.next }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --format="%s" --no-merges)
          else
            COMMITS=$(git log "$LATEST"..HEAD --format="%s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE "^[a-z]+!:|BREAKING CHANGE"; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE "^fix(\(.+\))?:"; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No release-worthy commits, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          if git tag -l | grep -qx "$NEXT"; then
            echo "Tag $NEXT already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($LATEST -> $NEXT)"

      - name: Build binaries
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          mkdir -p build dist
          for TARGET in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            OS="${TARGET%-*}"
            ARCH="${TARGET#*-}"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "-s -w -X main.version=$VERSION" -o build/tracer .
            cp tracer.1 build/
            tar -czf "dist/tracer-${TARGET}.tar.gz" -C build tracer tracer.1
            rm build/tracer build/tracer.1
          done

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.next }}
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/* --generate-notes --title "$VERSION"

      - name: Update Homebrew formula
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.next }}
          VERSION_NUM="${VERSION#v}"
          BASE_URL="https://github.com/TheDokT0r/tracer/releases/download/${VERSION}"

          # Get sha256 for each archive
          SHA_DARWIN_ARM64=$(curl -sL "${BASE_URL}/tracer-darwin-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(curl -sL "${BASE_URL}/tracer-darwin-amd64.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(curl -sL "${BASE_URL}/tracer-linux-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(curl -sL "${BASE_URL}/tracer-linux-amd64.tar.gz" | sha256sum | cut -d' ' -f1)

          # Generate formula
          cat > /tmp/tracer.rb << FORMULA
          class Tracer < Formula
            desc "TUI for browsing, inspecting, resuming, and deleting Claude Code sessions"
            homepage "https://github.com/TheDokT0r/tracer"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/tracer-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/tracer-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/tracer-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/tracer-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "tracer"
              man1.install "tracer.1"
            end

            test do
              assert_match "tracer", shell_output("#{bin}/tracer --version")
            end
          end
          FORMULA

          # Push to homebrew-tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/TheDokT0r/homebrew-tap.git" /tmp/homebrew-tap-update
          cp /tmp/tracer.rb /tmp/homebrew-tap-update/Formula/tracer.rb
          cd /tmp/homebrew-tap-update
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tracer.rb
          git commit -m "Update tracer to ${VERSION}" || true
          git push
